<!DOCTYPE html>
<html>
<head>
  <title>Car Game</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    #gameArea {
      width: 300px;
      height: 500px;
      background: #333;
      margin: auto;
      position: relative;
      overflow: hidden;
      border: 3px solid white;
    }

    .roadLine {
      width: 10px;
      height: 100px;
      background: white;
      position: absolute;
      left: 145px;
    }

    #car {
      width: 50px;
      height: 80px;
      background: red;
      position: absolute;
      bottom: 10px;
      left: 125px;
      border-radius: 10px;
    }

    .enemy {
      width: 50px;
      height: 80px;
      background: yellow;
      position: absolute;
      top: -100px;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      margin: 5px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h2>🚗 Car Driving Game</h2>
<div id="score">Score: 0</div>
<div id="highScore">High Score: 0</div>
<button onclick="startGame()">Start Game</button>

<div id="gameArea"></div>

<!-- Mobile Controls -->
<div>
  <button onclick="moveLeft()">⬅️</button>
  <button onclick="moveRight()">➡️</button>
</div>

<!-- Sound -->
<audio id="crash" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
let gameArea = document.getElementById("gameArea");
let scoreEl = document.getElementById("score");
let highScoreEl = document.getElementById("highScore");
let crashSound = document.getElementById("crash");

let car, enemies = [];
let score = 0;
let gameRunning = false;
let keys = { ArrowLeft:false, ArrowRight:false };

let highScore = localStorage.getItem("highScore") || 0;
highScoreEl.innerText = "High Score: " + highScore;

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function startGame() {
  gameArea.innerHTML = "";
  enemies = [];
  score = 0;
  gameRunning = true;

  // Car
  car = document.createElement("div");
  car.id = "car";
  gameArea.appendChild(car);

  // Road lines
  for(let i=0;i<5;i++){
    let line = document.createElement("div");
    line.classList.add("roadLine");
    line.style.top = (i*120)+"px";
    gameArea.appendChild(line);
  }

  // First enemy
  createEnemy();

  requestAnimationFrame(gameLoop);
}

function gameLoop() {
  if(!gameRunning) return;

  moveLines();
  moveCar();
  moveEnemies();
  checkCollision();

  score++;
  scoreEl.innerText = "Score: " + score;

  requestAnimationFrame(gameLoop);
}

function moveLines(){
  document.querySelectorAll(".roadLine").forEach(line=>{
    let top = parseInt(line.style.top);
    top += 6;
    if(top > 500) top = -100;
    line.style.top = top + "px";
  });
}

function moveCar(){
  let left = car.offsetLeft;

  if(keys.ArrowLeft && left > 0){
    car.style.left = left - 6 + "px";
  }

  if(keys.ArrowRight && left < 250){
    car.style.left = left + 6 + "px";
  }
}

function createEnemy(){
  let enemy = document.createElement("div");
  enemy.classList.add("enemy");
  enemy.style.left = Math.random()*250 + "px";
  gameArea.appendChild(enemy);
  enemies.push(enemy);
}

function moveEnemies(){
  enemies.forEach((enemy, i)=>{
    let top = enemy.offsetTop;
    top += 6;
    enemy.style.top = top + "px";

    if(top > 500){
      enemy.remove();
      enemies.splice(i,1);
      createEnemy();
    }
  });
}

function checkCollision(){
  let carRect = car.getBoundingClientRect();

  enemies.forEach(enemy=>{
    let enemyRect = enemy.getBoundingClientRect();

    if(
      carRect.top < enemyRect.bottom &&
      carRect.bottom > enemyRect.top &&
      carRect.left < enemyRect.right &&
      carRect.right > enemyRect.left
    ){
      crashSound.play();
      gameOver();
    }
  });
}

function gameOver(){
  gameRunning = false;

  if(score > highScore){
    localStorage.setItem("highScore", score);
  }

  alert("💥 Game Over! Score: " + score);
  location.reload();
}

// Mobile Buttons
function moveLeft(){
  car.style.left = (car.offsetLeft - 20) + "px";
}

function moveRight(){
  car.style.left = (car.offsetLeft + 20) + "px";
}
</script>

</body>
</html>
